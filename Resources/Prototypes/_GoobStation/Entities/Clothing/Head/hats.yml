  id: ClothingHeadHatBeretBlueshield
  name: blueshield's armored beret
  description: A durable beret woven out of durathread. Provides protection, too.
  components:
  - type: Sprite
    sprite: _GoobStation/Clothing/Head/Hats/blueshield_beret.rsi
  - type: Clothing
    sprite: _GoobStation/Clothing/Head/Hats/blueshield_beret.rsi
  - type: Tag
    tags:
