- type: entity
  parent: [UtensilBase, BaseHypospray]
  id: LPPTeaspoon
  name: teaspoon
  description: There is no spoon.
  components:
  - type: Tag
    tags:
    - Metal
  - type: Sprite
    state: spoon
    scale: 0.7, 0.7
  - type: Item
    heldPrefix: spoon
  - type: MeleeWeapon
    wideAnimationRotation: 180
    attackRate: 1.5
    damage:
      types:
        Blunt: 1
  - type: Shovel
    speedModifier: 0.01
  - type: UseDelay
    delay: 2
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: Injector
    solutionName: hypospray
    currentTransferAmount: null # Inject everything on injection.
    activeModeProtoId: JetInjectorDynamicMode
    allowedModes:
    - JetInjectorDynamicMode
    - JetInjectorInjectMode
